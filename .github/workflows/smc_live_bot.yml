name: SMC Live Bot - 24/7 Cloud Runner

on:
  schedule:
    - cron: '0 * * * *'   # Hourly backup guardian
  workflow_dispatch:

concurrency:
  group: smc-bot-runner
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install pandas numpy ta ccxt requests

    - name: Configure Git
      run: |
        git config --global user.name 'SMC Cloud Bot'
        git config --global user.email 'smc-bot@users.noreply.github.com'
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kill3rghost6-byte/smc-paper-trader.git

    - name: Run 24/7 Bot Loop
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PYTHONUNBUFFERED: "1"
      run: python -u smc_live_bot.py --continuous-cloud

    - name: Self-Trigger Next Session
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh workflow run smc_live_bot.yml --repo kill3rghost6-byte/smc-paper-trader

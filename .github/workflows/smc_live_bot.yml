name: SMC Aggressive Portfolio Live Bot

on:
  schedule:
    # Runs every 5 hours to spawn a continuous 5.5 hour worker
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy ta ccxt requests
        
    - name: Run Live Bot in Continuous Mode
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PAPER_TRADE_START: "2026-06-27 00:00:00"
      run: |
        git config --global user.name 'SMC Bot'
        git config --global user.email 'smc-bot@users.noreply.github.com'
        
        # Background job to commit state.json periodically if changed
        while true; do
          sleep 120
          git add state.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update paper trading state" && git pull --rebase && git push)
        done &
        
        python smc_live_bot.py --continuous

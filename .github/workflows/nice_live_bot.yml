name: NICE Scalper Live Bot

on:
  schedule:
    # Runs every 5 hours to spawn a continuous 5.5 hour worker
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: nice-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy ta ccxt requests
        
    - name: Run Live Bot in Continuous Mode
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PAPER_TRADE_START: "2026-06-27 00:00:00"
      run: |
        # Git config is needed by the Python script to push state.json
        git config --global user.name 'NICE Bot'
        git config --global user.email 'nice-bot@users.noreply.github.com'
        
        python nice_live_bot.py --continuous
